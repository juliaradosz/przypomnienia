{% extends 'reminders/base.html' %}

{% block title %}Usuń notatkę{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4 text-center">
                <i class="bi bi-exclamation-triangle display-4 text-danger"></i>
                <h5 class="mt-3">Usunąć notatkę?</h5>
                <p class="text-muted">
                    <strong>{{ note.subject }}</strong><br>
                    <small>{{ note.date|date:"d.m.Y" }}</small>
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <button type="submit" class="btn btn-danger px-4">
                            <i class="bi bi-trash"></i> Tak, usuń
                        </button>
                        <a href="{% url 'calendar' %}?year={{ note.date.year }}&month={{ note.date.month }}&day={{ note.date|date:'Y-m-d' }}" class="btn btn-outline-secondary px-4">Anuluj</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
