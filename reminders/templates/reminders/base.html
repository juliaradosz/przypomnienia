<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Przypomnienia{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-color: #f0f2f5;
        }
        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .navbar {
            background: var(--primary-gradient);
            box-shadow: 0 2px 15px rgba(102, 126, 234, 0.4);
        }
        .navbar-brand { font-weight: 700; letter-spacing: 0.5px; }
        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
            transition: all 0.3s;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.5);
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }
        .card-urgent { border-left: 4px solid #ef4444 !important; }
        .card-expired { border-left: 4px solid #6b7280 !important; opacity: 0.75; }
        .card-ok { border-left: 4px solid #22c55e !important; }
        .card-done { border-left: 4px solid #3b82f6 !important; opacity: 0.6; }
        .stat-card {
            border-radius: 16px;
            padding: 1.5rem;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .stat-card::after {
            content: '';
            position: absolute;
            top: -20px;
            right: -20px;
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
        }
        .stat-total { background: linear-gradient(135deg, #667eea, #764ba2); }
        .stat-urgent { background: linear-gradient(135deg, #f97316, #ef4444); }
        .stat-expired { background: linear-gradient(135deg, #6b7280, #374151); }
        .stat-done { background: linear-gradient(135deg, #22c55e, #16a34a); }
        .category-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }
        .filter-bar {
            background: white;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .badge-status {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}">
                <i class="bi bi-bell-fill me-1"></i> Przypomnienia
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto align-items-center gap-2">
                    {% if user.is_authenticated %}
                        <a class="nav-link text-white" href="{% url 'dashboard' %}"><i class="bi bi-bell"></i> Przypomnienia</a>
                        <a class="nav-link text-white" href="{% url 'calendar' %}"><i class="bi bi-calendar3"></i> Kalendarz</a>
                        <a class="nav-link text-white" href="{% url 'profile' %}"><i class="bi bi-person-circle"></i> {{ user.username }}</a>
                        <a class="btn btn-outline-light btn-sm ms-2" href="{% url 'logout' %}"><i class="bi bi-box-arrow-right"></i> Wyloguj</a>
                    {% else %}
                        <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">Zaloguj</a>
                        <a class="btn btn-light btn-sm" href="{% url 'register' %}">Rejestracja</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <div class="container fade-in">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i>{{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <footer class="text-center text-muted py-4 mt-5">
        <small>&copy; 2026 Przypomnienia App</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
