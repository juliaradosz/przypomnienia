{% extends 'reminders/base.html' %}

{% block title %}Usuń przypomnienie{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4 text-center">
                <i class="bi bi-exclamation-triangle display-4 text-danger"></i>
                <h4 class="mt-3">Czy na pewno chcesz usunąć?</h4>
                <p class="text-muted">{{ reminder.title }} ({{ reminder.get_category_display }})</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <button type="submit" class="btn btn-danger">Tak, usuń</button>
                        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Anuluj</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
