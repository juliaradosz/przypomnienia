{% extends 'reminders/base.html' %}

{% block title %}Usuń przypomnienie{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4 text-center">
                <i class="bi bi-exclamation-triangle display-3 text-danger"></i>
                <h4 class="mt-3">Czy na pewno chcesz usunąć?</h4>
                <p class="text-muted">
                    <strong>{{ reminder.title }}</strong><br>
                    <span class="badge bg-secondary mt-1">{{ reminder.get_category_display }}</span>
                    <br><small>Termin: {{ reminder.due_date }}</small>
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2 mt-3">
                        <button type="submit" class="btn btn-danger px-4">
                            <i class="bi bi-trash me-1"></i> Tak, usuń
                        </button>
                        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary px-4">Anuluj</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
